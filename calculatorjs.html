  <title>Calculator, but made using JavaScript - ILoveDogs5335's World</title>
  <div style="text-align: center; color: #9999ff; background-color: crimson; border: 5px solid firebrick; text-shadow: 2px 2px 2px #6666cc"> <a target="_self" href="https://ilovedogs5335.vercel.app"> <- Back to Main </a><a target="_self" href="https://ilovedogs5335.vercel.app/experiments.html"> <- Back to Experiments </a>
            <p>This is a calculator I made in Python, that I converted to JavaScript.</p>
            <button style="cursor: pointer;" onclick="calculator()">Do it!</button>
            <script>
              var number_1, number_2;
              function calculator() {
                number_1 = Number(window.prompt('Enter the first number.'));
                number_2 = Number(window.prompt('Enter the second number.'));
                window.alert(['Addition result: ' + String(number_1 + number_2), '. Subtraction result: ' + String(number_1 - number_2), '. Multiplication result: ' + String(number_1 * number_2), '. Division result: ' + String(number_1 / number_2), '. Exponentation result: ' + String(Math.pow(number_1, number_2)), ['. Root result: ', Math.pow(number_1, 1 / number_2), '.'].join('')].join(''));
              }
            </script>
            <p>Click the button to do a calculation!</p>
  </div>
</html>
